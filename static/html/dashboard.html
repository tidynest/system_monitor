<!-- ========== static/html/dashboard.html ========== -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>System Monitor Dashboard</title>

  <!-- HTMX for dynamic content loading -->
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <!-- SSE extension for real-time updates -->
  <script src="https://unpkg.com/htmx.org@1.9.10/dist/ext/sse.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      color: white;
      margin-bottom: 30px;
    }

    .header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    /* Status bar styling */
    .status-bar {
      display: flex;
      justify-content: space-between;
      color: rgba(255, 255, 255, 0.9);
      margin-bottom: 20px;
      padding: 10px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
    }

    /* Grid layout for metrics */
    .metrics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    /* Card styling */
    .metric-card {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      transition: transform 0.2s;
    }

    .metric-card:hover {
      transform: translateY(-5px);
    }

    .metric-header {
      display: flex;
      align-items: center;
      margin-bottom: 15px;
    }

    .metric-icon {
      font-size: 1.5rem;
      margin-right: 10px;
    }

    .metric-title {
      font-size: 1.2rem;
      font-weight: 600;
      color: #333;
    }

    .metric-value {
      font-size: 2rem;
      font-weight: bold;
      color: #667eea;
      margin-bottom: 10px;
    }

    /* Progress bars */
    .progress-bar {
      width: 100%;
      height: 20px;
      background: #e0e0e0;
      border-radius: 10px;
      overflow: hidden;
      position: relative;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea, #764ba2);
      border-radius: 10px;
      transition: width 0.3s ease;
    }

    /* Process tables */
    .process-table {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      margin-bottom: 20px;
    }

    .process-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #e0e0e0;
    }

    .process-row:last-child {
      border-bottom: none;
    }

    /* Loading indicator */
    .loading {
      color: #999;
      font-style: italic;
    }

    /* Layout for process tables */
    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 20px;
    }

    /* Disk and network items */
    .disk-item, .network-item {
      background: #f5f5f5;
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    /* Pulsing animation for status indicator */
    .pulse {
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>System Monitor</h1>
  </div>

  <!-- Status bar showing connection and system info -->
  <div class="status-bar">
    <div id="connection-status">
      <span class="pulse">⚡</span> Connecting...
    </div>
    <div id="timestamp">Waiting for data...</div>
    <div>Uptime: <span id="uptime">--</span></div>
  </div>

  <!-- Main metrics grid -->
  <div class="metrics-grid">
    <!-- CPU Card -->
    <div class="metric-card">
      <div class="metric-header">
        <span class="metric-icon">⚡</span>
        <span class="metric-title">CPU Usage</span>
      </div>
      <div class="metric-value" id="cpu-value">--%</div>
      <div class="progress-bar">
        <div id="cpu-bar" class="progress-fill" style="width: 0%"></div>
      </div>
      <div id="cpu-details" style="margin-top: 10px; font-size: 0.9rem; color: #666;">
        Cores: <span id="cpu-cores">--</span> |
        Freq: <span id="cpu-freq">--</span> MHz
      </div>
    </div>

    <!-- Memory Card -->
    <div class="metric-card">
      <div class="metric-header">
        <span class="metric-icon">💾</span>
        <span class="metric-title">Memory</span>
      </div>
      <div class="metric-value" id="memory-value">-- GB</div>
      <div class="progress-bar">
        <div id="memory-bar" class="progress-fill" style="width: 0%"></div>
      </div>
      <div id="memory-details" style="margin-top: 10px; font-size: 0.9rem; color: #666;">
        Available: <span id="memory-available">--</span> GB |
        Swap: <span id="swap-usage">--</span> GB
      </div>
    </div>

    <!-- Network Card with HTMX dynamic loading -->
    <div class="metric-card">
      <div class="metric-header">
        <span class="metric-icon">🌐</span>
        <span class="metric-title">Network</span>
      </div>
      <!-- HTMX attributes for automatic updates -->
      <div id="network-info"
           hx-get="/metrics/network"
           hx-trigger="load, every 2s"
           hx-swap="innerHTML">
        <div class="loading">Loading...</div>
      </div>
    </div>

    <!-- Disk Card with HTMX dynamic loading -->
    <div class="metric-card">
      <div class="metric-header">
        <span class="metric-icon">💿</span>
        <span class="metric-title">Disk Usage</span>
      </div>
      <!-- Update disk info every 5 seconds -->
      <div id="disk-info"
           hx-get="/metrics/disks"
           hx-trigger="load, every 5s"
           hx-swap="innerHTML">
        <div class="loading">Loading...</div>
      </div>
    </div>
  </div>

  <!-- Process tables with HTMX -->
  <div class="grid-container">
    <!-- Top CPU processes -->
    <div class="process-table">
      <h3 style="margin-bottom: 15px;">Top CPU Processes</h3>
      <div id="cpu-processes"
           hx-get="/metrics/processes"
           hx-trigger="load, every 2s"
           hx-swap="innerHTML">
        <div class="loading">Loading...</div>
      </div>
    </div>

    <!-- Top Memory processes -->
    <div class="process-table">
      <h3 style="margin-bottom: 15px;">Top Memory Processes</h3>
      <div id="memory-processes"
           hx-get="/metrics/processes?type=memory"
           hx-trigger="load, every 2s"
           hx-swap="innerHTML">
        <div class="loading">Loading...</div>
      </div>
    </div>
  </div>
</div>

<!-- Hidden SSE container for HTMX extension -->
<div id="sse-container" hx-ext="sse" sse-connect="/metrics/stream" sse-swap="message" style="display: none;"></div>

<script>
  // Initialize SSE connection for real-time metrics
  const evtSource = new EventSource('/metrics/stream');

  // Connection established handler
  evtSource.onopen = function() {
    document.getElementById('connection-status').innerHTML = '<span class="pulse">⚡</span> Connected';
  };

  // Connection error handler
  evtSource.onerror = function() {
    document.getElementById('connection-status').innerHTML = '<span style="color: red;">⚠️</span> Reconnecting...';
  };

  // Process incoming SSE messages - using exact field names from backend
  evtSource.onmessage = function(e) {
    try {
      const data = JSON.parse(e.data);

      // Update CPU metrics (all these fields exist in your backend)
      if (data.cpu_usage) {
        document.getElementById('cpu-value').textContent = data.cpu_usage;
      }
      if (data.cpu_percent !== undefined) {
        document.getElementById('cpu-bar').style.width = data.cpu_percent + '%';
      }
      if (data.cpu_cores !== undefined) {
        document.getElementById('cpu-cores').textContent = data.cpu_cores;
      }
      if (data.cpu_freq !== undefined) {
        document.getElementById('cpu-freq').textContent = data.cpu_freq;
      }

      // Update Memory metrics (check each field exists)
      if (data.memory_used !== undefined && data.memory_total !== undefined) {
        document.getElementById('memory-value').textContent =
                `${data.memory_used.toFixed(1)} / ${data.memory_total.toFixed(1)} GB`;
      }
      if (data.memory_percent !== undefined) {
        document.getElementById('memory-bar').style.width = data.memory_percent + '%';
      }
      if (data.memory_available !== undefined) {
        document.getElementById('memory-available').textContent = data.memory_available.toFixed(1);
      }
      if (data.swap_used !== undefined && data.swap_total !== undefined) {
        document.getElementById('swap-usage').textContent =
                `${data.swap_used.toFixed(1)}/${data.swap_total.toFixed(1)}`;
      }

      // Update system info
      if (data.timestamp) {
        document.getElementById('timestamp').textContent = data.timestamp;
      }
      if (data.uptime) {
        document.getElementById('uptime').textContent = data.uptime;
      }
    } catch (err) {
      console.error('Error parsing SSE data:', err);
    }
  };
</script>
</body>
</html>
